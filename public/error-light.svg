    <style>
        @keyframes fadePulse {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 1; }
        }
        @keyframes scaleBreath {
        0%, 100% { transform: scale(0.98); }
        50% { transform: scale(1); }
        }
        .animate-fade {
        animation: fadePulse 2.4s ease-in-out infinite;
        }
        .animate-scale {
        animation: scaleBreath 2.4s ease-in-out infinite;
        }
    </style>
